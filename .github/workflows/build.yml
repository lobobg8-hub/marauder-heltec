name: Build Marauder for Heltec V3

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deste repositório
        uses: actions/checkout@v4

      - name: Clonar ESP32 Marauder
        run: |
          git clone https://github.com/justcallmekoko/ESP32Marauder.git ESP32Marauder

      - name: Mostrar estrutura do projeto
        run: |
          pwd
          ls -la
          ls -la ESP32Marauder
          find ESP32Marauder -name platformio.ini

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/platformio
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('ESP32Marauder/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Mostrar ambientes disponíveis
        working-directory: ESP32Marauder
        run: |
          pio project config

      - name: Compilar Heltec V3
        working-directory: ESP32Marauder
        run: |
          pio run -e heltec_wifi_lora_32_V3

      - name: Verificar firmware
        working-directory: ESP32Marauder
        run: |
          ls -lh .pio/build/heltec_wifi_lora_32_V3/

      - name: Publicar firmware
        uses: actions/upload-artifact@v4
        with:
          name: heltec-v3-marauder-firmware
          path: ESP32Marauder/.pio/build/heltec_wifi_lora_32_V3/firmware.bin

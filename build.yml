name: Build Marauder for Heltec V3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone ESP32Marauder
        run: git clone --depth=1 --branch v1.12.3 https://github.com/justcallmekoko/ESP32Marauder.git

      - name: Enable GENERIC_ESP32 (headless build)
        run: |
          sed -i 's|//#define GENERIC_ESP32|#define GENERIC_ESP32|' ESP32Marauder/esp32_marauder/configs.h

      - name: Create platformio.ini
        run: |
          cat > ESP32Marauder/esp32_marauder/platformio.ini << 'EOF'
          [env:heltec_wifi_lora_v3]
          platform = espressif32
          board = esp32-s3-devkitc-1
          framework = arduino
          board_build.partitions = default_8MB.csv
          board_build.flash_mode = qio
          board_build.f_flash = 80000000L
          board_build.mcu = esp32s3
          board_upload.flash_size = 8MB
          monitor_speed = 115200
          upload_speed = 921600
          build_flags =
              -DGENERIC_ESP32
              -DARDUINO_USB_CDC_ON_BOOT=1
              -DBOARD_HAS_PSRAM
              -w
          lib_deps =
              bblanchon/ArduinoJson@^6.21.3
              h2zero/NimBLE-Arduino@^1.4.1
              adafruit/Adafruit NeoPixel@^1.11.0
              ivanseidel/LinkedList@^1.3.3
          lib_extra_dirs =
              libraries
          EOF

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: ESP32Marauder/esp32_marauder
        run: pio run -e heltec_wifi_lora_v3

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: heltec-v3-marauder-firmware
          path: ESP32Marauder/esp32_marauder/.pio/build/heltec_wifi_lora_v3/firmware.bin
